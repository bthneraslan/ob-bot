name: borsa-test
on:
  workflow_dispatch:
  push:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Hangi borsa ABD'den acilir
        run: |
          code(){ curl -s -o /dev/null -w "$1 -> %{http_code}\n" "$2"; }
          echo "=== Runner IP ==="; curl -s https://ifconfig.me; echo ""
          echo "=== FUTURES BORSALARI ==="
          code "Binance fapi   " "https://fapi.binance.com/fapi/v1/ping"
          code "Kraken Futures " "https://futures.kraken.com/derivatives/api/v3/instruments"
          code "Bybit          " "https://api.bybit.com/v5/market/time"
          code "OKX            " "https://www.okx.com/api/v5/public/time"
          code "Gate.io futures" "https://api.gateio.ws/api/v4/futures/usdt/contracts?limit=1"
          code "Hyperliquid    " "https://api.hyperliquid.xyz/info"
          echo "=== Hyperliquid gercek veri (POST) ==="
          curl -s -X POST -H "Content-Type: application/json" -d '{"type":"meta"}' "https://api.hyperliquid.xyz/info" | head -c 200; echo ""
