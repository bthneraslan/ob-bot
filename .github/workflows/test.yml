name: binance-test
on:
  workflow_dispatch:
  push:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Binance futures API erisilebilir mi
        run: |
          echo "=== Runner IP ==="
          curl -s https://ifconfig.me; echo ""
          echo "=== Binance FUTURES (fapi) HTTP kodu ==="
          curl -s -o /dev/null -w "%{http_code}\n" "https://fapi.binance.com/fapi/v1/ping"
          echo "=== Binance FUTURES klines (gercek veri) ==="
          curl -s "https://fapi.binance.com/fapi/v1/klines?symbol=BTCUSDT&interval=1h&limit=2" | head -c 300; echo ""
          echo "=== Spot data.binance.vision ==="
          curl -s -o /dev/null -w "%{http_code}\n" "https://data-api.binance.vision/api/v3/ping"
